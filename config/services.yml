services:
  _defaults:
    public: true

  # CreditJet configuration form
  prestashop.module.creditjet.form.type.creditjet_configuration:
    class: 'PrestaShop\Module\CreditJet\Form\CreditJetConfigurationType'
    parent: 'form.type.translatable.aware'
    public: true
    tags:
      - { name: form.type }

  prestashop.module.creditjet.form.creditjet_configuration_data_configuration:
    class: PrestaShop\Module\CreditJet\Form\CreditJetConfigurationDataConfiguration
    arguments: ['@prestashop.adapter.legacy.configuration']

  prestashop.module.creditjet.form.creditjet_configuration_form_data_provider:
    class: 'PrestaShop\Module\CreditJet\Form\CreditJetConfigurationFormDataProvider'
    arguments:
      - '@prestashop.module.creditjet.form.creditjet_configuration_data_configuration'

  prestashop.module.creditjet.creditjet_configuration_form_handler:
    class: 'PrestaShop\PrestaShop\Core\Form\Handler'
    arguments:
      - '@form.factory'
      - '@prestashop.core.hook.dispatcher'
      - '@prestashop.module.creditjet.form.creditjet_configuration_form_data_provider'
      - 'PrestaShop\Module\CreditJet\Form\CreditJetConfigurationType'
      - 'CreditJetConfiguration'
      
